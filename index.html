<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>MiniTruck | Precision Truck Booking</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Lexend:wght@700;800;900&display=swap" rel="stylesheet" />
    <style>
      :root {
        --primary: #3B82F6;
        --dark: #0F172A;
      }
      body, html {
        margin: 0;
        padding: 0;
        width: 100%;
        min-height: 100%;
        font-family: 'Inter', sans-serif;
        background-color: var(--dark);
        color: white;
      }

      .welcome-text {
        font-family: 'Lexend', sans-serif;
        font-weight: 800;
        font-size: 28px;
        text-align: center;
        letter-spacing: 0.1em;
        margin-bottom: 40px;
        color: #ffffff;
        animation: fadeInDown 0.8s ease-out;
      }

      @keyframes fadeInDown {
        0% { opacity: 0; transform: translateY(-20px); }
        100% { opacity: 1; transform: translateY(0); }
      }

      /* Smart Redirect Loader */
      #smart-loader {
        position: fixed;
        inset: 0;
        background: var(--dark);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        transition: opacity 0.5s ease;
      }

      #loading-box {
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      /* Offline UI - Glassmorphic */
      #offline-ui {
        display: none;
        flex-direction: column;
        align-items: center;
        text-align: center;
        padding: 40px;
        background: rgba(255, 255, 255, 0.03);
        backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 32px;
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        max-width: 320px;
      }

      .truck-icon {
        width: 120px;
        height: 120px;
        margin-bottom: 24px;
        opacity: 0.9;
      }

      h1 {
        font-weight: 800;
        font-size: 24px;
        margin: 0 0 12px 0;
        background: linear-gradient(135deg, #fff 0%, #94a3b8 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }

      p {
        font-size: 15px;
        color: #94a3b8;
        line-height: 1.6;
        margin: 0 0 32px 0;
      }

      .btn {
        background: white;
        color: var(--dark);
        border: none;
        padding: 14px 32px;
        border-radius: 16px;
        font-weight: 700;
        font-size: 15px;
        cursor: pointer;
        transition: all 0.2s ease;
        box-shadow: 0 10px 15px -3px rgba(0,0,0,0.3);
      }

      .btn:active {
        transform: scale(0.95);
        opacity: 0.9;
      }

      /* Spinner */
      .spinner {
        width: 40px;
        height: 40px;
        border: 4px solid rgba(59, 130, 246, 0.1);
        border-top: 4px solid var(--primary);
        border-radius: 50%;
        animation: spin 1s linear infinite;
        margin-bottom: 20px;
      }

      @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div id="smart-loader">
      <div id="loading-box">
        <h2 class="welcome-text">WELCOME TO MINITRUCK</h2>
        <div class="spinner"></div>
      </div>

      <div id="offline-ui">
        <!-- SVG Truck Front Icon -->
        <svg class="truck-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M19 12V18C19 19.1046 18.1046 20 17 20H7C5.89543 20 5 19.1046 5 18V12M19 12V9C19 7.89543 18.1046 7 17 7H7C5.89543 7 5 7.89543 5 9V12M19 12H5M7 20V22M17 20V22M9 11H15M4 12V18C4 18.5523 4.44772 19 5 19H19C19.5523 19 20 18.5523 20 18V12H4Z" stroke="#3B82F6" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <h1>Connection Lost</h1>
        <p>We're having trouble reaching the server. Please check your internet connection.</p>
        <button class="btn" onclick="tryReload()">Retry Connection</button>
      </div>
    </div>

    <div id="root"></div>

    <script>
      const PRODUCTION_URL = 'https://minitruck-app.vercel.app';
      const PING_ENDPOINT = PRODUCTION_URL + '/api/hello';

      function checkConnectivity() {
        console.log('🚀 Checking connection to:', PING_ENDPOINT);
        
        // Show loading spinner
        document.getElementById('loading-box').style.display = 'block';
        document.getElementById('offline-ui').style.display = 'none';

        fetch(PING_ENDPOINT, { mode: 'no-cors', cache: 'no-store' })
          .then(() => {
            console.log('✅ Server reachable, redirecting...');
            window.location.href = PRODUCTION_URL;
          })
          .catch((err) => {
            console.error('❌ Server unreachable:', err);
            document.getElementById('loading-box').style.display = 'none';
            document.getElementById('offline-ui').style.display = 'flex';
          });
      }

      function tryReload() {
        checkConnectivity();
      }

      // Start the process
      if (window.location.protocol === 'capacitor:' || window.location.href.includes('android')) {
        setTimeout(checkConnectivity, 500);
      } else {
        // Just hide the loader and start normally if in web dev
        document.getElementById('smart-loader').style.display = 'none';
      }
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
