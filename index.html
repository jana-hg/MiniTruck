<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>MiniTruck | Precision Truck Booking</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Lexend:wght@700;800;900&family=Poppins:wght@700;800;900&display=swap" rel="stylesheet" />
    <style>
      :root {
        --primary: #3B82F6;
        --dark: #0F172A;
      }
      body, html {
        margin: 0;
        padding: 0;
        width: 100%;
        min-height: 100%;
        font-family: 'Inter', sans-serif;
        background-color: var(--dark);
        color: white;
      }

      .welcome-text {
        font-family: 'Poppins', sans-serif;
        font-weight: 900;
        font-size: 32px;
        text-align: center;
        letter-spacing: -0.5px;
        margin-bottom: 40px;
        animation: fadeInDown 0.8s ease-out;
        background: linear-gradient(135deg, #ffffff 0%, #94a3b8 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      @media (prefers-color-scheme: light) {
        body, html {
          background-color: #F8FAFC;
        }
        .welcome-text {
          background: linear-gradient(135deg, #000000 0%, #374151 100%);
          -webkit-background-clip: text;
          -webkit-text-fill-color: transparent;
          background-clip: text;
        }
      }

      @keyframes fadeInDown {
        0% { opacity: 0; transform: translateY(-20px); }
        100% { opacity: 1; transform: translateY(0); }
      }

      /* Fix for keyboard resize lag */
      #root {
        height: 100%;
        width: 100%;
        overflow-x: hidden;
        -webkit-overflow-scrolling: touch;
      }

    </style>
  </head>
  <body>
    <div id="root"></div>

    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
