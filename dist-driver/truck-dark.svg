<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <defs>
    <linearGradient id="bgd" x1="0" y1="0" x2="120" y2="120" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFD700"/>
      <stop offset="100%" stop-color="#FF8C00"/>
    </linearGradient>
  </defs>
  <rect width="120" height="120" rx="26" fill="url(#bgd)"/>
  <!-- Truck 3/4 front view -->
  <!-- Main body/cargo -->
  <rect x="20" y="38" width="50" height="38" rx="5" fill="#1A1A1A"/>
  <rect x="25" y="43" width="16" height="4" rx="2" fill="#FFD700" opacity="0.3"/>
  <rect x="25" y="50" width="10" height="4" rx="2" fill="#FFD700" opacity="0.2"/>
  <!-- Cabin -->
  <path d="M70 46 L70 76 L100 76 L100 58 L88 46 Z" fill="#2A2A2A" stroke="#1A1A1A" stroke-width="2"/>
  <!-- Windshield -->
  <path d="M74 48 L74 64 L96 64 L96 56 L86 48 Z" fill="#B8860B"/>
  <!-- Windshield reflection -->
  <path d="M78 50 L78 56 L84 50 Z" fill="#FFD700" opacity="0.4"/>
  <!-- Headlight -->
  <rect x="94" y="66" width="6" height="4" rx="2" fill="#FFD700"/>
  <!-- Bumper -->
  <rect x="18" y="76" width="84" height="6" rx="3" fill="#2A2A2A"/>
  <!-- Wheel left -->
  <circle cx="38" cy="86" r="10" fill="#111"/>
  <circle cx="38" cy="86" r="5" fill="#B8860B"/>
  <circle cx="38" cy="86" r="2" fill="#111"/>
  <!-- Wheel right -->
  <circle cx="86" cy="86" r="10" fill="#111"/>
  <circle cx="86" cy="86" r="5" fill="#B8860B"/>
  <circle cx="86" cy="86" r="2" fill="#111"/>
  <!-- Ground shadow -->
  <ellipse cx="60" cy="98" rx="40" ry="4" fill="#000" opacity="0.3"/>
  <!-- Side mirror -->
  <rect x="98" y="52" width="8" height="5" rx="2" fill="#1A1A1A"/>
</svg>
